name: Build and publish

# Triggers:
#   - push to main: full pipeline, push to ACR with :main and :<short-sha> tags
#   - PR: full pipeline including ACR push, with :pr-<number> tag (allows lab demo
#     where vulnerable variant gets rejected; same pipeline runs everywhere)
on:
  push:
    branches: [main]
    paths:
      - "apps/sample-api/**"
      - ".github/workflows/main-workflow.yml"
  pull_request:
    paths:
      - "apps/sample-api/**"
      - ".github/workflows/main-workflow.yml"
  # For manual triggers
  workflow_dispatch:

# OIDC + read needed for everything; write on packages/security-events comes later.
permissions:
  id-token: write
  contents: read
  security-events: write

# Cancel superseded runs on the same ref to save minutes and ACR storage.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      # Don't kill the hardened job just because vulnerable failed Trivy - we want
      # both columns of the demo to complete independently.
      fail-fast: false
      matrix:
        variant: [vulnerable, hardened]

    env:
      APP: sample-api
      DOCKERFILE: apps/sample-api/${{ matrix.variant }}/Dockerfile
      BUILD_CONTEXT: apps/sample-api

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute tags
        id: tag
        run: |
          # Local tag (no registry) is only used by Trivy and Syft on the
          # buildx-loaded image; nothing on the registry side ever sees it.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF_TAG="pr-${{ github.event.pull_request.number }}"
          else
            REF_TAG="${{ github.ref_name }}"
          fi
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-6)"
          LOCAL_TAG="${APP}:${{ matrix.variant }}-${SHORT_SHA}"

          # Registry tags fed straight into docker/build-push-action's `tags:`
          # input (newline-separated). Always an immutable <short-sha>; plus a
          # moving 'main' tag on push-to-main, or a pr-<n> tag on PRs.
          REG_BASE="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}"
          REGISTRY_TAGS="${REG_BASE}:${SHORT_SHA}"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            REGISTRY_TAGS="${REGISTRY_TAGS}"$'\n'"${REG_BASE}:main"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REGISTRY_TAGS="${REGISTRY_TAGS}"$'\n'"${REG_BASE}:${REF_TAG}"
          fi

          {
            echo "short_sha=${SHORT_SHA}"
            echo "local_tag=${LOCAL_TAG}"
            echo "registry_tags<<EOF"
            echo "${REGISTRY_TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Azure login (federated)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      # ---- Local build for scanning ---------------------------------------
      # Loaded into the docker daemon so Trivy/Syft can work against it BEFORE
      # anything reaches ACR. Hardened variant: if Trivy finds fixable
      # CRITICAL/HIGH CVEs, the workflow fails here and nothing gets pushed.
      # Vulnerable variant: gate set to exit 0 so the broken image still gets
      # published for the Kyverno admission demo (where the vuln attestation
      # produced below is what causes Kyverno to reject it at runtime).
      #
      # NOTE: we deliberately do NOT use this load step to push. Buildx's
      # load+tag+push round-trip can produce a digest in `docker inspect`
      # that differs from the digest the registry actually serves for the
      # tag, which is what previously caused Kyverno to fail with
      # "no signatures found" — it was resolving `:main` to a different
      # digest than the one we'd signed. The push is done in a separate
      # step below whose `digest` output is authoritative.
      - name: Build image locally (no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: ${{ steps.tag.outputs.local_tag }}
          # Local cache speeds up rebuilds; mode=max so the registry push step
          # below can reuse every layer.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ hashFiles('.github/workflows/main-workflow.yml') }}
          restore-keys: trivy-db-${{ runner.os }}-

      # ---- Trivy gate ------------------------------------------------------
      # Production policy: fail on FIXABLE high/critical only. Unfixed CVEs
      # in OS base packages are an irreducible floor and gating on them
      # produces non-actionable failures.

      - name: Trivy scan (JSON for gating)
        id: trivy_gate_scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.local_tag }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: trivy-gate-${{ matrix.variant }}.json
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache
      
      - name: Evaluate Trivy vulnerability gate
        id: vuln_gate
        shell: bash
        run: |
          FIXABLE_COUNT=$(jq '
            [
              .Results[]?.Vulnerabilities[]?
              | select(
                  (.Severity == "HIGH" or .Severity == "CRITICAL")
                )
            ] | length
          ' trivy-gate-${{ matrix.variant }}.json)
      
          echo "Fixable HIGH/CRITICAL vulnerabilities: $FIXABLE_COUNT"
      
          if [ "$FIXABLE_COUNT" -eq 0 ]; then
            echo "sign=true" >> "$GITHUB_OUTPUT"
            echo "Image PASSED vulnerability gate"
          else
            echo "sign=false" >> "$GITHUB_OUTPUT"
            echo "Image FAILED vulnerability gate"
          fi

      # The next two steps run even if the gate failed, so we always upload
      # the report. Without 'if: always()' a failed gate would lose its evidence.
      - name: Trivy scan (full report -> SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.local_tag }}
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-${{ matrix.variant }}.sarif
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba # v4.35.5
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          # Categorise per variant so vulnerable findings don't shadow hardened
          # findings in the Security UI.
          category: trivy-${{ matrix.variant }}

      - name: Upload Trivy report as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          path: trivy-${{ matrix.variant }}.sarif
          retention-days: 30

      # ---- Trivy vuln predicate (for disallow-high-cve-images policy) -----
      # Trivy's `cosign-vuln` format produces the in-toto predicate body that
      # corresponds to predicate type https://cosign.sigstore.dev/attestation/vuln/v1
      # — the exact type the Kyverno policy looks for. Without this step the
      # disallow-high-cve-images policy cannot ever pass because the
      # attestation it needs to evaluate simply isn't in the registry.
      #
      # No `if: always()`: if the hardened variant failed the gate we don't
      # push, sign, or attest. Vulnerable variant always produces an
      # attestation — that's the whole point of the lab demo (Kyverno will
      # read it, see CRITICAL fixable CVEs, and reject the pod).
      - name: Trivy scan (cosign-vuln predicate for attestation)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.tag.outputs.local_tag }}
          severity: HIGH,CRITICAL
          format: cosign-vuln
          output: trivy-vuln-${{ matrix.variant }}.json
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload Trivy vuln predicate as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-vuln-${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          path: trivy-vuln-${{ matrix.variant }}.json
          if-no-files-found: error
          retention-days: 30

      # ---- SBOM ------------------------------------------------------------
      # SBOM only generated for images that *passed* the Trivy gate. Vulnerable
      # images technically still get one because their gate is set to exit 0.
      - name: Generate SBOM (CycloneDX) with Syft
        if: steps.vuln_gate.outputs.sign == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.tag.outputs.local_tag }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.variant }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM as workflow artifact
        if: steps.vuln_gate.outputs.sign == 'true'         
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          path: sbom-${{ matrix.variant }}.cdx.json
          if-no-files-found: error
          retention-days: 30

      # ---- Push to ACR -----------------------------------------------------
      # Separate build with push: true. Layers are reused from the GHA cache
      # populated by the local build above (mode=max), so in practice this is
      # effectively a manifest push and finishes in seconds.
      #
      # The crucial output here is `steps.push.outputs.digest`: that is the
      # digest ACR actually returns for the pushed manifest, i.e. exactly
      # what Kyverno will see when it resolves any of these tags at admission
      # time. Signing against this digest guarantees the signature lives at
      # `<repo>:sha256-<digest>.sig` for the same digest the tag resolves to.
      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Build and push to ACR
        id: push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.tag.outputs.registry_tags }}
          # Read-only cache from the local build above. No cache-to needed;
          # the previous step already wrote the cache in mode=max.
          cache-from: type=gha,scope=${{ matrix.variant }}

      - name: Show pushed image digest
        run: |
          echo "Registry digest: ${{ steps.push.outputs.digest }}"
          echo "Pinned ref:      ${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.push.outputs.digest }}"

      # ---- Cosign keyless signing + attestations --------------------------
      # Public Sigstore (Fulcio + public Rekor). Identity is bound to the
      # GitHub Actions OIDC token claims of THIS workflow run. There is no
      # private key anywhere - the ephemeral signing cert lives ~10 minutes,
      # then is discarded. The signature, cert, and Rekor proof go to ACR.
      - name: Install Cosign
        if: steps.vuln_gate.outputs.sign == 'true'
        env:
          # Cosign v3.0+ writes signatures as OCI 1.1 referring artifacts in
          # the new sigstore protobuf bundle format. Kyverno understands this
          # but ONLY when the policy opts in with `type: SigstoreBundle`. If
          # you ever drop that field, Kyverno falls back to the default
          # `type: Cosign` verifier, which looks for the legacy
          # <repo>:sha256-<digest>.sig tag — cosign v3 doesn't write there
          # by default, and you get "no signatures found" at admission time.
          COSIGN_VERSION: v3.0.6
        run: |
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Cosign sign image (keyless via GitHub OIDC)
        if: steps.vuln_gate.outputs.sign == 'true'
        env:
          # Required for keyless mode in CI. Tells Cosign to use the GitHub Actions
          # OIDC token rather than prompting for an interactive browser login.
          COSIGN_YES: "true"
        run: |
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.push.outputs.digest }}"
          echo "Signing: ${IMAGE_REF}"
          cosign sign "${IMAGE_REF}"

      - name: Cosign attest SBOM (CycloneDX, in-toto envelope, keyless)
        if: steps.vuln_gate.outputs.sign == 'true'
        env:
          COSIGN_YES: "true"
        run: |
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.push.outputs.digest }}"
          echo "Attaching SBOM attestation to: ${IMAGE_REF}"
          cosign attest \
            --predicate "sbom-${{ matrix.variant }}.cdx.json" \
            --type cyclonedx \
            "${IMAGE_REF}"

      - name: Cosign attest Trivy vuln scan (keyless)
        if: steps.vuln_gate.outputs.sign == 'true'
        env:
          COSIGN_YES: "true"
        run: |
          # The --type vuln shorthand produces predicate type
          # https://cosign.sigstore.dev/attestation/vuln/v1 — what the
          # Kyverno disallow-high-cve-images policy filters on.
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.push.outputs.digest }}"
          echo "Attaching vuln attestation to: ${IMAGE_REF}"
          cosign attest \
            --predicate "trivy-vuln-${{ matrix.variant }}.json" \
            --type vuln \
            "${IMAGE_REF}"

      # ---- End-to-end verification ----------------------------------------
      # Verify against BOTH the digest AND the immutable tag. Verifying only
      # by digest is a tautology — we'd be checking that the signature for X
      # exists at the location keyed by X, which is true by construction.
      # The tag-based verify is the one that actually mirrors what Kyverno
      # does at admission, and would have caught the original failure mode.
      - name: Verify signatures and attestations (by digest AND by tag)
        if: steps.vuln_gate.outputs.sign == 'true'
        env:
          IDENTITY_REGEX: ^https://github\.com/${{ github.repository }}/\.github/workflows/
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          BY_DIGEST="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.push.outputs.digest }}"
          BY_TAG="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}:${{ steps.tag.outputs.short_sha }}"

          for REF in "${BY_DIGEST}" "${BY_TAG}"; do
            echo "============================================================"
            echo "Verifying ${REF}"
            echo "============================================================"

            echo "--- image signature ---"
            cosign verify \
              --certificate-identity-regexp "${IDENTITY_REGEX}" \
              --certificate-oidc-issuer "${ISSUER}" \
              "${REF}" \
              | jq '.[0] | {identity: .critical.identity, issuer: .optional."1.3.6.1.4.1.57264.1.1"}'

            echo "--- SBOM attestation ---"
            cosign verify-attestation \
              --type cyclonedx \
              --certificate-identity-regexp "${IDENTITY_REGEX}" \
              --certificate-oidc-issuer "${ISSUER}" \
              "${REF}" > /dev/null
            echo "OK"

            echo "--- vuln attestation ---"
            cosign verify-attestation \
              --type vuln \
              --certificate-identity-regexp "${IDENTITY_REGEX}" \
              --certificate-oidc-issuer "${ISSUER}" \
              "${REF}" > /dev/null
            echo "OK"
          done
