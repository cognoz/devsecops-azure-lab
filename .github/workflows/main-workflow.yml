name: Build and publish

# Triggers:
#   - push to main: full pipeline, push to ACR with :main and :sha-<short> tags
#   - PR: full pipeline including ACR push, with :pr-<number> tag (allows lab demo
#     where vulnerable variant gets rejected; same pipeline runs everywhere)
on:
  push:
    branches: [main]
    paths:
      - "apps/sample-api/**"
      - ".github/workflows/main-workflow.yml"
  pull_request:
    paths:
      - "apps/sample-api/**"
      - ".github/workflows/main-workflow.yml"
  # For manual triggers
  workflow_dispatch:

# OIDC + read needed for everything; write on packages/security-events comes later.
permissions:
  id-token: write
  contents: read
  security-events: write 

# Cancel superseded runs on the same ref to save minutes and ACR storage.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest

    strategy:
      # Don't kill the hardened job just because vulnerable failed Trivy - we want
      # both columns of the demo to complete independently.
      fail-fast: false
      matrix:
        variant: [vulnerable, hardened]

    env:
      APP: sample-api
      DOCKERFILE: apps/sample-api/${{ matrix.variant }}/Dockerfile
      BUILD_CONTEXT: apps/sample-api

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compute image tag
        id: tag
        run: |
          # Push: 'main' on main branch, plus immutable sha tag.
          # PR:   'pr-<number>' tag.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            REF_TAG="pr-${{ github.event.pull_request.number }}"
          else
            REF_TAG="${{ github.ref_name }}"
          fi
          SHORT_SHA="$(echo "${{ github.sha }}" | cut -c1-6)"
          echo "ref_tag=${REF_TAG}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=${APP}/${{ matrix.variant }}" >> "$GITHUB_OUTPUT"

      - name: Azure login (federated)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (no push yet)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ${{ env.BUILD_CONTEXT }}
          file: ${{ env.DOCKERFILE }}
          push: false
          load: true
          tags: |
            ${{ env.APP }}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          # Local cache speeds up rebuilds; Buildx handles cache layering.
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,scope=${{ matrix.variant }},mode=max

      # ---- Trivy gate ------------------------------------------------------
      # Production policy: fail on FIXABLE high/critical only. Unfixed CVEs
      # in OS base packages are an irreducible floor and gating on them
      # produces non-actionable failures.
      - name: Trivy scan (gate on fixable HIGH/CRITICAL)
        id: trivy_gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.APP }}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: ${{ matrix.variant == 'hardened' && '1' || '0' }}
          format: table
        env:
          # Cache the Trivy DB between runs to save ~30s.
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Cache Trivy DB
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae #v5.0.5
        with:
          path: /tmp/trivy-cache
          key: trivy-db-${{ runner.os }}-${{ hashFiles('.github/workflows/main-workflow.yml') }}
          restore-keys: trivy-db-${{ runner.os }}-

      # The next two steps run even if the gate failed, so we always upload
      # the report. Without 'if: always()' a failed gate would lose its evidence.
      - name: Trivy scan (full report -> SARIF for Security tab)
        if: always()
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.APP }}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          severity: MEDIUM,HIGH,CRITICAL
          format: sarif
          output: trivy-${{ matrix.variant }}.sarif
        env:
          TRIVY_CACHE_DIR: /tmp/trivy-cache

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        with:
          sarif_file: trivy-${{ matrix.variant }}.sarif
          # Categorise per variant so vulnerable findings don't shadow hardened
          # findings in the Security UI.
          category: trivy-${{ matrix.variant }}

      - name: Upload Trivy report as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: trivy-${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          path: trivy-${{ matrix.variant }}.sarif
          retention-days: 30

      - name: Show built image
        run: |
          docker images "${{ env.APP }}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}"

      # SBOM only generated for images that *passed* the Trivy gate. Vulnerable
      # images don't get an SBOM since they shouldn't be shipping anyway.
      # No 'if: always()' here — this is correct, intentional behavior.
      - name: Generate SBOM (CycloneDX) with Syft
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 #v0.24.0
        with:
          image: ${{ env.APP }}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.variant }}.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}
          path: sbom-${{ matrix.variant }}.cdx.json
          if-no-files-found: error
          retention-days: 30

      # ---- Push to ACR -----------------------------------------------------
      # Only reached if Trivy gate passed (vulnerable variant never gets here).
      # We push two tags:
      #   - immutable: <variant>-<short-sha>     (always)
      #   - moving:    <variant>-main             (only on push to main)
      - name: ACR login
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Tag image for ACR
        id: acr_tag
        run: |
          LOCAL_TAG="${APP}:${{ matrix.variant }}-${{ steps.tag.outputs.short_sha }}"
          IMMUTABLE="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}:${{ steps.tag.outputs.short_sha }}"
          docker tag "${LOCAL_TAG}" "${IMMUTABLE}"
          echo "immutable=${IMMUTABLE}" >> "$GITHUB_OUTPUT"

          # Add a moving 'main' tag only when this is a push to main.
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            MOVING="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}:main"
            docker tag "${LOCAL_TAG}" "${MOVING}"
            echo "moving=${MOVING}" >> "$GITHUB_OUTPUT"
          fi

      - name: Push immutable tag
        run: docker push "${{ steps.acr_tag.outputs.immutable }}"

      - name: Push moving tag (main only)
        if: steps.acr_tag.outputs.moving != ''
        run: docker push "${{ steps.acr_tag.outputs.moving }}"

      - name: Show pushed image digest
        id: digest
        run: |
          # Capture the digest of the pushed image. We'll need this for Cosign later
          # Signing by digest (not tag) is what makes signatures verifiable.
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "${{ steps.acr_tag.outputs.immutable }}" | cut -d@ -f2)
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "Image digest: ${DIGEST}"
          echo "Full pinned ref: ${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${DIGEST}"

      # ---- Cosign keyless signing + SBOM attestation ----------------------
      # Public Sigstore (Fulcio + public Rekor). Identity is bound to the
      # GitHub Actions OIDC token claims of THIS workflow run. There is no
      # private key anywhere - the ephemeral signing cert lives ~10 minutes,
      # then is discarded. The signature, cert, and Rekor proof go to ACR.

      # Install directly, though utilizing of third party actions is also possible
      - name: Install Cosign
        env:
          COSIGN_VERSION: v3.0.6
        run: |
          curl -sSfL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
            -o /usr/local/bin/cosign
          chmod +x /usr/local/bin/cosign
          cosign version

      - name: Cosign sign image (keyless via GitHub OIDC)
        env:
          # Required for keyless mode in CI. Tells Cosign to use the GitHub Actions
          # OIDC token rather than prompting for an interactive browser login.
          COSIGN_YES: "true"
        run: |
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.digest.outputs.digest }}"
          echo "Signing: ${IMAGE_REF}"
          cosign sign "${IMAGE_REF}"

      - name: Cosign attest SBOM (CycloneDX, in-toto envelope, keyless)
        env:
          COSIGN_YES: "true"
        run: |
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.digest.outputs.digest }}"
          echo "Attaching SBOM attestation to: ${IMAGE_REF}"
          cosign attest \
            --predicate "sbom-${{ matrix.variant }}.cdx.json" \
            --type cyclonedx \
            "${IMAGE_REF}"

      - name: Verify signature and SBOM attestation
        run: |
          IMAGE_REF="${{ vars.ACR_LOGIN_SERVER }}/${APP}/${{ matrix.variant }}@${{ steps.digest.outputs.digest }}"

          # Verify the image signature matches THIS workflow's identity.
          # certificate-identity-regexp matches any branch in our repo,
          # which is how a Kyverno policy on AKS would verify in Week 2.
          echo "=== Verify image signature ==="
          cosign verify \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/\.github/workflows/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}" \
            | jq '.[0] | {critical: .critical.identity, issuer: .optional."1.3.6.1.4.1.57264.1.1"}'

          echo
          echo "=== Verify SBOM attestation ==="
          cosign verify-attestation \
            --type cyclonedx \
            --certificate-identity-regexp "^https://github\.com/${{ github.repository }}/\.github/workflows/" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${IMAGE_REF}" \
            > /dev/null
          echo "SBOM attestation verified."
