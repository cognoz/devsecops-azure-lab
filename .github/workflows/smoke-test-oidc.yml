name: Smoke test - Azure OIDC

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-azure-access:
    name: Verify Azure access via OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Azure login (federated, no client secret)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show identity and roles
        run: |
          echo "=== Logged-in identity ==="
          az account show -o json
          echo
          echo "=== SP details ==="
          az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" \
            --query "{displayName:displayName, appId:appId, objectId:id}" -o json
          echo
          echo "=== Roles assigned to this SP ==="
          # Note: this query needs Directory.Read access to resolve principalId names.
          # The list itself works regardless.
          SP_OBJECT_ID=$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)
          az role assignment list --assignee "${SP_OBJECT_ID}" --all -o table

      - name: Test ACR push permission (the actual thing the role is for)
        run: |
          # AcrPush gives us /pull/read and /push/write on the data plane.
          # It deliberately does NOT include control-plane registries/read,
          # which is why 'az acr show' returns "could not be found".
          # That's correct least-privilege - we just push, we don't query.
          #
          # The right test is: can we authenticate and push a tiny image?

          echo "Logging into ACR via the federated SP..."
          az acr login --name "${{ vars.ACR_NAME }}"

          echo "Building a tiny test image..."
          mkdir -p /tmp/smoke-test
          cat > /tmp/smoke-test/Dockerfile <<'EOF'
          FROM scratch
          LABEL purpose="oidc-smoke-test"
          EOF
          docker build -t "${{ vars.ACR_LOGIN_SERVER }}/oidc-smoke-test:$(date +%s)" /tmp/smoke-test
          docker tag "$(docker images -q | head -1)" "${{ vars.ACR_LOGIN_SERVER }}/oidc-smoke-test:latest"

          echo "Pushing to ACR..."
          docker push "${{ vars.ACR_LOGIN_SERVER }}/oidc-smoke-test:latest"

          echo "PASS: image pushed successfully via OIDC-federated SP"

      - name: Install kubelogin
        # AKS clusters with AAD-only auth (local_account_disabled=true) need kubelogin
        # to convert kubeconfig auth to AAD tokens.
        run: |
          curl -sL https://github.com/Azure/kubelogin/releases/latest/download/kubelogin-linux-amd64.zip \
            -o /tmp/kubelogin.zip
          unzip -j /tmp/kubelogin.zip -d /tmp/
          sudo mv /tmp/kubelogin /usr/local/bin/
          kubelogin --version

      - name: Test AKS access (kubeconfig + kubectl end-to-end)
        run: |
          # Cluster User Role grants listClusterUserCredential (control plane).
          # AKS RBAC Writer grants kubectl operations (data plane).
          # Together: minimal Azure RBAC + minimal Kubernetes RBAC = working pipeline access.
          echo "Fetching kubeconfig..."
          az aks get-credentials \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

          # Convert kubeconfig to use AAD tokens via kubelogin (azurecli mode reuses
          # the credentials from the 'azure/login' step above).
          kubelogin convert-kubeconfig -l azurecli

          echo
          echo "=== Cluster info ==="
          kubectl cluster-info

          echo
          echo "=== Create and delete a test pod (proves write works) ==="
          POD="oidc-smoke-$(date +%s)"
          kubectl run "${POD}" --image=mcr.microsoft.com/azuredocs/aks-helloworld:v1 \
            --restart=Never -n default
          kubectl get pod "${POD}" -n default
          kubectl delete pod "${POD}" -n default --wait=false

          echo "PASS: kubectl works end-to-end via OIDC"

      - name: Negative test - confirm we are NOT subscription owner
        run: |
          echo "=== Attempting an action we should NOT have permission for ==="
          # Subscription-scoped RG creation must fail. If it succeeds, the SP is over-permissioned.
          set +e
          OUTPUT=$(az group create --name "should-not-be-able-to-create-$(date +%s)" --location westeurope 2>&1)
          RC=$?
          echo "$OUTPUT"
          set -e

          if echo "$OUTPUT" | grep -qE "AuthorizationFailed|does not have authorization|Forbidden"; then
            echo "PASS: action correctly denied"
          elif [[ $RC -ne 0 ]]; then
            echo "PASS: action failed (assuming auth-related)"
          else
            echo "FAIL: SP is over-permissioned!"
            exit 1
          fi
