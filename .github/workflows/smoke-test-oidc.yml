name: Smoke test - Azure OIDC

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  verify-azure-access:
    name: Verify Azure access via OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (federated, no client secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show identity we authenticated as
        run: |
          echo "=== Logged-in identity ==="
          az account show -o json
          echo
          echo "=== SP details ==="
          az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" \
            --query "{displayName:displayName, appId:appId, objectId:id}" -o json

      - name: Show role assignments granted to this SP
        run: |
          # Useful for proving least-privilege in the lab story.
          SP_OBJECT_ID=$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)
          echo "Roles assigned to SP ${SP_OBJECT_ID}:"
          az role assignment list --assignee "${SP_OBJECT_ID}" --all -o table

      - name: Verify ACR access (AcrPush role)
        run: |
          echo "ACR: ${{ vars.ACR_NAME }} (${{ vars.ACR_LOGIN_SERVER }})"
          # 'show' exercises read on the resource; 'repository list' exercises the data plane.
          az acr show --name "${{ vars.ACR_NAME }}" --query "{name:name, sku:sku.name, loginServer:loginServer}" -o table
          echo
          echo "Repositories:"
          az acr repository list --name "${{ vars.ACR_NAME }}" -o table || \
            echo "(no repositories yet, that's expected on a fresh registry)"

      - name: Verify AKS control-plane access
        run: |
          echo "AKS: ${{ vars.AKS_CLUSTER_NAME }} in RG ${{ vars.AZURE_RESOURCE_GROUP }}"
          az aks show \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --name "${{ vars.AKS_CLUSTER_NAME }}" \
            --query "{name:name, k8s:kubernetesVersion, status:provisioningState}" -o table

      - name: Negative test - confirm we are NOT subscription owner
        run: |
          echo "=== Attempting an action we should NOT have permission for ==="
          # Subscription-scoped RG creation should fail with AuthorizationFailed.
          # If this succeeds, the SP is over-permissioned.
          if az group create --name "should-not-be-able-to-create-$(date +%s)" --location westeurope 2>&1 | tee /tmp/result; then
            if grep -q "AuthorizationFailed\|does not have authorization" /tmp/result; then
              echo "PASS: action correctly denied"
            else
              echo "FAIL: action succeeded - SP is over-permissioned!"
              # Clean up the accidentally-created RG
              RG=$(grep -oP '"name": "\K[^"]+' /tmp/result || true)
              [[ -n "$RG" ]] && az group delete --name "$RG" --yes --no-wait || true
              exit 1
            fi
          else
            echo "PASS: action correctly denied"
          fi
