# ArgoCD Application installing Falco from the upstream Helm chart, with
# Falcosidekick enabled for event fan-out.
#
# What this installs:
#   - falco: per-node DaemonSet, eBPF driver, syscall-based detection
#   - falcosidekick: deployment that receives Falco's gRPC/HTTP events and
#     forwards them to configured outputs (web UI, webhooks, etc.)
#   - falcosidekick-ui: small Deployment + Redis for the event browser at
#     http://falcosidekick-ui.falco.svc.cluster.local:2802
#
# Architecture notes:
#   - Falco runs as a DaemonSet on every user-pool node. We pin to the spot
#     pool via tolerations/nodeSelector to match the rest of the lab.
#   - falcoctl init container is disabled. By default the chart pulls Falco
#     rules from a registry at startup, which (a) is another runtime
#     dependency on ghcr.io and (b) means rule changes don't trip ArgoCD
#     drift detection. We ship rules via the chart's rulesFiles instead,
#     making rules ConfigMap state fully managed by Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: 8.0.4   # appVersion 0.43.0
    helm:
      releaseName: falco
      values: |
        load_plugins: []
        # Modern eBPF (CO-RE): no kernel module, no driver-loader pod, no
        # privileged probe build. Requires kernel >= 5.8. AKS Ubuntu 22.04
        # ships with 5.15+ so this is safe.
        driver:
          kind: modern_ebpf

        tolerations:
          - key: kubernetes.azure.com/scalesetpriority
            operator: Equal
            value: spot
            effect: NoSchedule
        nodeSelector:
          kubernetes.azure.com/scalesetpriority: spot

        # Resource sizing per node. Falco itself is light; the eBPF probe
        # accounts for most CPU. These limits leave headroom for the rules
        # engine under load.
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        image:
          registry: acrdevsecopsrk964.azurecr.io
          repository: falcosecurity/falco
          tag: 0.43.0

        # falcoctl pulls rules from a registry at startup or on a schedule.
        # We disable both: rules live in our Git, shipped via the chart's
        # rulesFiles below. This keeps the chart's behaviour deterministic
        # and fully GitOps-managed.
        falcoctl:
          artifact:
            install:
              enabled: false
            follow:
              enabled: false
          image:
            registry: acrdevsecopsrk964.azurecr.io
            tag: 0.13.0

        falco:
          config_files: []
          rules_files:
            - /etc/falco/falco_rules.yaml
            - /etc/falco/falco_rules.local.yaml
            - /etc/falco/k8s_audit_rules.yaml
            - /etc/falco/rules.d
          json_output: true
          json_include_output_property: true
          log_level: info
          # gRPC server for falcosidekick to consume events from.
          grpc:
            enabled: true
          grpc_output:
            enabled: true

        customRules:
          rules-overrides.yaml: |-
            # ──────────────────────────────────────────────────────────────────
            # AKS noise suppressions for Falco default ruleset.
            #
            # Specifically NOT in any allowlist:
            #   - sample-api/* (our own workload — must stay visible)
            #   - defender-test/* (the test namespace for Defender demos)
            #   - falco itself (no, we don't get a free pass)
            # ──────────────────────────────────────────────────────────────────
        
            # ─── "Drop and execute new binary in container" ──────────────────
            # ama-logs (Azure Monitor Container Insights) copies
            # a half-dozen sidecar binaries (mdsd, telegraf, fluent-bit) into
            # its containers at runtime — this is Microsoft-managed behaviour
            # we can't change, and the cmdlines are all known-good Azure agents.
            - macro: user_known_drop_and_execute_in_container_conditions
              condition: >
                (container.image.repository = "mcr.microsoft.com/azuremonitor/containerinsights/ciprod")
        
            # ─── "Contact K8S API Server From Container" ─────────────────────
            # Fires on any pod talking to kubernetes.default.svc. ArgoCD's
            # application-controller is the central controller of a GitOps
            - macro: user_known_contact_k8s_api_server_activities
              condition: >
                (container.image.repository = "quay.io/argoproj/argocd")

        # ------------------------------------------------------------------
        # Falcosidekick — receives events from Falco, fans them out.
        # ------------------------------------------------------------------
        falcosidekick:
          enabled: true

          # Sidekick also lands on spot.
          tolerations:
            - key: kubernetes.azure.com/scalesetpriority
              operator: Equal
              value: spot
              effect: NoSchedule
          nodeSelector:
            kubernetes.azure.com/scalesetpriority: spot

          image:
            registry: acrdevsecopsrk964.azurecr.io
            repository: falcosecurity/falcosidekick
            tag: 2.33.0

          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi

          # Tag every outbound event with the cluster name so we can
          # filter cleanly in KQL once events reach LAW.
          config:
            customfields: "cluster:aks-devsecops-rk964"
            # Default minimum priority: notice and above. Drops debug and
            # informational. Tighten to "warning" once rules are tuned in
            # day 2.
            existingSecret: ""

          # Web UI for browsing events during the lab. Drop for prod.
          webui:
            enabled: true

            tolerations:
              - key: kubernetes.azure.com/scalesetpriority
                operator: Equal
                value: spot
                effect: NoSchedule
            nodeSelector:
              kubernetes.azure.com/scalesetpriority: spot

            image:
              registry: acrdevsecopsrk964.azurecr.io
              repository: falcosecurity/falcosidekick-ui
              tag: 2.3.0

            # Sidekick UI is backed by Redis. Mirror that too.
            redis:
              image:
                registry: acrdevsecopsrk964.azurecr.io
                repository: redis/redis-stack
                tag: 7.2.0-v11
              tolerations:
                - key: kubernetes.azure.com/scalesetpriority
                  operator: Equal
                  value: spot
                  effect: NoSchedule
              nodeSelector:
                kubernetes.azure.com/scalesetpriority: spot

            resources:
              requests:
                cpu: 20m
                memory: 64Mi
              limits:
                memory: 128Mi

  destination:
    server: https://kubernetes.default.svc
    namespace: falco

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
