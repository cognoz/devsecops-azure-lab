# Verify that all images from our ACR were signed by THIS repo's CI workflow.
#
# Enforcement strategy:
#   - Audit cluster-wide by default.
#   - Enforce only in the sample-api namespace via validationFailureActionOverrides.
#
# NOTE: validationFailureActionOverrides only accepts a plain `namespaces` list,
# NOT a namespaceSelector. The namespaceSelector key is silently ignored by
# Kyverno, which is why a label-based approach does not work here.
#
# NOTE: mutateDigest is false because mutation only fires when the policy is
# in Enforce mode. Setting it true causes inconsistent behaviour (mutates in
# sample-api, does nothing elsewhere). Keeping false is consistent everywhere.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify image signatures (keyless Cosign)
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Verifies that container images from the lab ACR were signed by the
      project's GitHub Actions workflow using keyless Cosign (Fulcio CA +
      public Rekor). Pods in the sample-api namespace carrying images without
      a valid signature are rejected.
spec:
  validationFailureAction: Audit
  validationFailureActionOverrides:
    - action: Enforce
      namespaces:
        - sample-api
  background: false
  webhookTimeoutSeconds: 30
  failurePolicy: Fail

  rules:
    - name: verify-acr-images-signed-by-workflow
      match:
        any:
          - resources:
              kinds:
                - Pod

      verifyImages:
        - imageReferences:
            - "acrdevsecopsrk964.azurecr.io/*"

          # Use the AKS managed identity (same identity the kubelet uses for
          # AcrPull) to authenticate Kyverno's signature lookup against ACR.
          # Without this Kyverno has no credentials and returns "no signatures
          # found" even when signatures are present in the registry.
          imageRegistryCredentials:
            providers:
              - azure

          mutateDigest: false
          verifyDigest: false
          required: true

          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/cognoz/devsecops-azure-lab/.github/workflows/main-workflow.yml@refs/heads/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
