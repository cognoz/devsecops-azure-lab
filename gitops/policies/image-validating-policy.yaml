apiVersion: policies.kyverno.io/v1alpha1
kind: ImageValidatingPolicy
metadata:
  name: verify-acr-images
spec:
  failurePolicy: Fail

  webhookConfiguration:
    timeoutSeconds: 30

  evaluation:
    background:
      enabled: false

  validationActions:
    - Deny

  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: sample-api

  matchImageReferences:
    - glob: "*"

  credentials:
    allowInsecureRegistry: false
    providers:
      - default
      - azure
    secrets:
      - acr-kyverno

  attestors:
    - name: githubactions
      cosign:
        keyless:
          identities:
            - issuer: "https://token.actions.githubusercontent.com"
              subjectRegExp: "https://github.com/cognoz/devsecops-azure-lab/.github/workflows/main-workflow.yml@refs/heads/.*"

        ctlog:
          url: "https://rekor.sigstore.dev"

  validationConfigurations:
    required: true
    mutateDigest: false
    verifyDigest: false

  validations:
    - expression: >-
        object.spec.containers.all(c,
          verifyImageSignatures(
            c.image,
            [attestors.githubactions]
          ) > 0
        )
      message: >-
        All container images in namespace sample-api
        must be signed by the approved GitHub Actions workflow.
